services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: debrief
      POSTGRES_PASSWORD: debrief
      POSTGRES_DB: debrief
    ports:
      - "5432:5432"
    volumes:
      - debrief_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debrief -d debrief"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://debrief:debrief@db:5432/debrief
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  debrief_pgdata: